name: Sync to Maestro

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  sync-to-private:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to private repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MAESTRO_PAT }}
          script: |
            // Constants
            const PRIVATE_REPO = { owner: 'joinmaestro', repo: 'maestro' };
            const PUBLIC_REPO = { owner: 'joinmaestro', repo: 'coach-hub' };
            const PROJECT_ID = 'PVT_kwDODjTikM4BTWpN';
            const DUE_DATE_FIELD_ID = 'PVTF_lADODjTikM4BTWpNzhAnpV8';
            const ASSIGNEE = 'tarlanfaal';

            const issue = context.payload.issue;
            const action = context.payload.action;
            const comment = context.payload.comment;

            // Handle: New issue opened in coach-hub
            if (action === 'opened') {
              // Skip if synced from maestro (has tracking ID)
              if (issue.body?.includes('_Tracking ID:')) {
                console.log('Skipping - synced from maestro');
                return;
              }

              // Create issue in private repo
              await github.rest.issues.create({
                ...PRIVATE_REPO,
                title: issue.title,
                body: `**Submitted via Coach Hub**\n\n${issue.body}\n\n---\n_Public issue: ${issue.html_url}_`,
                labels: ['public'],
                assignees: [ASSIGNEE]
              });

              // Assign to public issue
              await github.rest.issues.addAssignees({
                ...PUBLIC_REPO,
                issue_number: issue.number,
                assignees: [ASSIGNEE]
              });

              // Add to project board
              const addResult = await github.graphql(`
                mutation {
                  addProjectV2ItemById(input: {
                    projectId: "${PROJECT_ID}"
                    contentId: "${issue.node_id}"
                  }) { item { id } }
                }
              `);

              // Parse and set due date (MM-DD-YYYY format)
              const dueDateMatch = issue.body?.match(/### Due Date\s*\n\s*(\d{2})-(\d{2})-(\d{4})/);
              if (dueDateMatch) {
                const [_, month, day, year] = dueDateMatch;
                await github.graphql(`
                  mutation {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: "${PROJECT_ID}"
                      itemId: "${addResult.addProjectV2ItemById.item.id}"
                      fieldId: "${DUE_DATE_FIELD_ID}"
                      value: { date: "${year}-${month}-${day}" }
                    }) { projectV2Item { id } }
                  }
                `);
              }

              // Confirm receipt
              await github.rest.issues.createComment({
                ...PUBLIC_REPO,
                issue_number: issue.number,
                body: '✅ Request received! We\'ll update this ticket as we make progress.'
              });
            }

            // Handle: Comment syncing
            else if (action === 'created' && comment) {
              // Skip automated/synced comments to prevent loops
              const skipPatterns = [
                'Request received!',
                'Materials complete!',
                '**Comment from coach-hub:**'
              ];
              if (skipPatterns.some(p => comment.body.includes(p))) {
                console.log('Skipping automated comment');
                return;
              }

              // Find linked maestro issue
              const search = await github.rest.search.issuesAndPullRequests({
                q: `repo:${PRIVATE_REPO.owner}/${PRIVATE_REPO.repo} is:issue "${issue.html_url}" in:body`
              });

              if (search.data.total_count > 0) {
                await github.rest.issues.createComment({
                  ...PRIVATE_REPO,
                  issue_number: search.data.items[0].number,
                  body: `**Comment from coach-hub:**\n\n${comment.body}`
                });
                console.log(`Synced comment to maestro #${search.data.items[0].number}`);
              }
            }
