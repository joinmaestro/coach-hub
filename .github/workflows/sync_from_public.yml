name: Sync New Requests to Private Repo

on:
  issues:
    types: [opened]

jobs:
  sync-to-private:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue in private repo and add to project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MAESTRO_PAT }}
          script: |
            const issue = context.payload.issue;

            // Skip if this issue was synced FROM maestro (has tracking ID)
            if (issue.body && issue.body.includes('_Tracking ID:')) {
              console.log('Skipping - this issue was synced from maestro');
              return;
            }

            // Create issue in private repo with assignee
            const newIssue = await github.rest.issues.create({
              owner: 'joinmaestro',
              repo: 'maestro',
              title: issue.title,
              body: `**Submitted via Coach Hub**\n\n${issue.body}\n\n---\n_Public issue: ${issue.html_url}_`,
              labels: ['public'],
              assignees: ['tarlanfaal']
            });

            // Assign tarlanfaal to the public issue too
            await github.rest.issues.addAssignees({
              owner: 'joinmaestro',
              repo: 'coach-hub',
              issue_number: issue.number,
              assignees: ['tarlanfaal']
            });

            // Add to project board #4
            const addToProject = `
              mutation {
                addProjectV2ItemById(input: {
                  projectId: "PVT_kwDODjTikM4BTWpN"
                  contentId: "${issue.node_id}"
                }) {
                  item { id }
                }
              }
            `;
            const projectResult = await github.graphql(addToProject);
            const itemId = projectResult.addProjectV2ItemById.item.id;

            // Parse due date from issue body (format: MM-DD-YYYY)
            const dueDateMatch = issue.body.match(/### Due Date\s*\n\s*(\d{2}-\d{2}-\d{4})/);
            if (dueDateMatch) {
              const [month, day, year] = dueDateMatch[1].split('-');
              const isoDate = `${year}-${month}-${day}`;

              // Set due date on project item
              const setDueDate = `
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "PVT_kwDODjTikM4BTWpN"
                    itemId: "${itemId}"
                    fieldId: "PVTF_lADODjTikM4BTWpNzhAnpV8"
                    value: { date: "${isoDate}" }
                  }) {
                    projectV2Item { id }
                  }
                }
              `;
              await github.graphql(setDueDate);
            }

            // Add comment to public issue
            await github.rest.issues.createComment({
              owner: 'joinmaestro',
              repo: 'coach-hub',
              issue_number: issue.number,
              body: '✅ Request received! We\'ll update this ticket as we make progress.'
            });
